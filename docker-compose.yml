services:
  postgres:
    image: postgis/postgis:latest
    container_name: sanguept-postgres
    environment:
      POSTGRES_DB: sanguept
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5444:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d sanguept"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
