<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <p th:if="${firstName != null and !firstName.isEmpty()}" th:text="'Olá ' + ${firstName} + '!'">Olá!</p>
    <p th:if="${firstName == null or firstName.isEmpty()}">Olá!</p>
    <p>Recebemos um pedido para redefinir a sua palavra-passe.</p>
    <p>Clique no link abaixo para criar uma nova palavra-passe:</p>
    <p>
        <a th:href="'https://sanguept.pt/reset-password?token=' + ${token}">
            Redefinir palavra-passe
        </a>
    </p>
    <p>Este link expira em 24 horas.</p>
    <p>Se não pediu para redefinir a palavra-passe, ignore este email.</p>
</body>
</html>
